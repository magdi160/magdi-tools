<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magdi Pro | الحلول الذكية</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #38bdf8; --secondary: #818cf8; --dark: #0f172a; --card: #1e293b; }
        
        * { box-sizing: border-box; transition: all 0.3s ease; }
        
        body {
            margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(-45deg, #0f172a, #1e293b, #1e1b4b, #0f172a);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            color: white; min-height: 100vh; display: flex; align-items: center; justify-content: center;
        }

        @keyframes gradient { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .container { width: 90%; max-width: 500px; background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); padding: 40px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.1); text-align: center; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }

        .profile-img { width: 100px; height: 100px; background: var(--primary); border-radius: 50%; margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; font-size: 40px; box-shadow: 0 0 20px var(--primary); }

        h1 { margin: 10px 0; font-size: 2rem; background: linear-gradient(to right, #38bdf8, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .services { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 25px 0; }
        .service-item { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 12px; font-size: 0.9rem; border: 1px solid rgba(255,255,255,0.05); }
        .service-item i { color: var(--primary); margin-bottom: 8px; display: block; }

        .btn { display: flex; align-items: center; justify-content: center; gap: 10px; padding: 16px; border-radius: 14px; text-decoration: none; font-weight: 600; margin-bottom: 15px; position: relative; overflow: hidden; }
        
        .btn-main { background: var(--primary); color: var(--dark); }
        .btn-main:hover { transform: scale(1.03); box-shadow: 0 0 20px rgba(56, 189, 248, 0.4); }

        .btn-sub { border: 1px solid rgba(255,255,255,0.2); color: white; background: rgba(255,255,255,0.05); }
        .btn-sub:hover { background: rgba(255,255,255,0.1); border-color: var(--primary); }

        .footer { margin-top: 20px; font-size: 0.8rem; opacity: 0.6; }
    </style>
</head>
<body>
    <div class="container">
        <div class="profile-img"><i class="fas fa-code"></i></div>
        <h1>Magdi Pro</h1>
        <p>نطور لك المستقبل بأدوات اليوم الذكية</p>

        <div class="services">
            <div class="service-item"><i class="fab fa-telegram"></i> بوتات تلجرام</div>
            <div class="service-item"><i class="fas fa-robot"></i> أتمتة مهام</div>
            <div class="service-item"><i class="fas fa-database"></i> أنظمة محاسبية</div>
            <div class="service-item"><i class="fas fa-shield-alt"></i> حماية وتأمين</div>
        </div>
        
        <a href="https://t.me/MagdiPro1" class="btn btn-main">
            <i class="fas fa-rocket"></i> انضم للقناة الرسمية
        </a>
        
        <a href="https://t.me/MagdiSupport_Bot" class="btn btn-sub">
            <i class="fas fa-comment-dots"></i> اطلب مشروعك الآن
        </a>

        <div class="footer">
            Sanaa, Yemen | 2026 <br>
            Designed with Passion by Magdi
        </div>
    </div>
</body>
</html>
