<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magdi Pro | المستودع التقني</title>
    <style>
        :root { --main-bg: #0f172a; --card-bg: #1e293b; --accent: #38bdf8; --text: #f1f5f9; }
        body { font-family: 'Tahoma', sans-serif; background-color: var(--main-bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 15px; }
        .container { background: var(--card-bg); width: 100%; max-width: 450px; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); border: 1px solid #334155; text-align: center; }
        .logo { font-size: 50px; margin-bottom: 20px; }
        h1 { font-size: 1.8rem; margin-bottom: 10px; color: var(--accent); }
        p { line-height: 1.6; color: #94a3b8; margin-bottom: 30px; }
        .btn-box { display: flex; flex-direction: column; gap: 15px; }
        .btn { padding: 15px; border-radius: 12px; text-decoration: none; font-weight: bold; transition: 0.3s; font-size: 1.1rem; }
        .btn-primary { background: var(--accent); color: #0f172a; }
        .btn-secondary { border: 2px solid var(--accent); color: var(--accent); }
        .btn:hover { transform: translateY(-3px); opacity: 0.9; }
        .footer { margin-top: 30px; font-size: 0.8rem; color: #64748b; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">👨‍💻</div>
        <h1>Magdi Pro</h1>
        <p>مرحباً بك في عالم الأتمتة والحلول التقنية الذكية. انضم إلينا لاكتشاف أقوى السكربتات والأدوات البرمجية.</p>
        <div class="btn-box">
            <a href="https://t.me/MagdiPro1" class="btn btn-primary">🚀 دخول قناة التلجرام</a>
            <a href="https://t.me/MagdiSupport_Bot" class="btn btn-secondary">👨‍🔧 اطلب خدمتك الخاصة</a>
        </div>
        <div class="footer">Sanaa, Yemen | 2026 <br> Produced by magdi160</div>
    </div>
</body>
</html>
